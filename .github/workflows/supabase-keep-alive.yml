name: Keep Everything Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # 3일마다 실행
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Supabase 깨우기
      - name: Ping Supabase
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -s -X GET "$SB_URL/rest/v1/posts?select=*" \
          -H "apikey: $SB_KEY" \
          -H "Authorization: Bearer $SB_KEY"

      # 2. GitHub Action 자체가 멈추는 것 방지 (50일마다 빈 커밋)
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Git Keep-alive (Conditional)
        run: |
          # 50일 주기를 맞추기 위해 날짜 계산 로직을 넣거나, 그냥 매달 실행되게 할 수 있습니다.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keep-alive commit"
          git push
