name: Keep Everything Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # 3일마다 실행
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Supabase 깨우기 (오류 발생 시 Action 실패하도록 -f 옵션 추가)
      - name: Ping Supabase
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase API..."
          curl -f -s -X GET "$SB_URL/rest/v1/posts?select=*&limit=1" \
          -H "apikey: $SB_KEY" \
          -H "Authorization: Bearer $SB_KEY"
          echo "Ping successful!"

      # 2. 레포지토리 체크아웃
      - name: Checkout repo
        uses: actions/checkout@v4

      # 3. 빈 커밋으로 GitHub Action 일시정지 방지
      - name: Git Keep-alive
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: Keep-alive commit $(date +'%Y-%m-%d')"
          git push
